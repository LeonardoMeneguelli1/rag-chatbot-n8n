version: "3.9"

services:

  postgres:
    image: pgvector/pgvector:pg16
    container_name: rag_postgres
    env_file:
      - .env
    environment:
      HF_TOKEN: ${HF_TOKEN}
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama
    container_name: rag_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  api:
    build: ./api
    container_name: rag_api
    env_file:
      - .env
    ports:
      - "${API_PORT}:8000"
    depends_on:
      - postgres
      - ollama
    volumes:
      - ./api:/app

  n8n:
    image: n8nio/n8n
    container_name: rag_n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  postgres_data:
  ollama_data:
  n8n_data: